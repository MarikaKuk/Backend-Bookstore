<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">


<head>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet" />
    <title>Booklist</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>

<body>
    <form th:action="@{/logout}" method="post">
        <input type="submit" value="Sign Out" />
        <h3>User: <span sec:authentication="name"></span></h3>
    </form>
    <h1>Books</h1>
    <table class="table table-stiped">
        <tr>
            <th>Author</th>
            <th>Title</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Category</th>
        </tr>
        <tr th:each="book : ${books}">
            <td th:text="${book.author}"></td>
            <td th:text="${book.title}"></td>
            <td th:text="${book.isbn}"></td>
            <td th:text="${book.publicationYear}"></td>
            <td th:text="${book.category.name}"></td>

            <td sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/delete/{id}(id=${book.id})}"><button type="submit"
                        class="btn btn-danger">Delete</button></a></td>
            <td sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/edit/{id}(id=${book.id})}"><button type="submit"
                        class="btn btn-warning">Edit</button></a></td>
        </tr>
    </table>
    <a href="/add"><button type="submit" class="btn btn-success">Add Book</button></a>
</body>

</html>
